[project]
name = "iwa-guardrail-checker"
version = "0.1.0"
description = "Preflight checker for survival-oriented bioinformatics datasets"
channels = ["conda-forge"]
platforms = ["linux-64"]

[tasks]
app = "python -m streamlit run iwa_guardrail_checker.py"

[dependencies]
python = ">=3.10,<3.13"
streamlit = "*"
pandas = "*"
numpy = "*"
plotly = "*"
